<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">World map with glowing points for places I've pushed code</title>
  <desc id="desc">A stylized world map highlighting Singapore, Thailand, Egypt, Poland, Italy, France, England, Netherlands, Greece, Bulgaria, Montenegro, and Croatia.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="64" x2="1080" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06142C"/>
      <stop offset="0.45" stop-color="#0B2453"/>
      <stop offset="1" stop-color="#210F4F"/>
    </linearGradient>
    <linearGradient id="mapGlow" x1="240" y1="96" x2="940" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="#35E3FF"/>
      <stop offset="0.55" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .small-copy { font: 600 1.2rem 'Segoe UI', Arial, sans-serif; letter-spacing: 0.14em; text-transform: uppercase; fill: #9FD9FF; opacity: 0.9; }
      .headline { font: 700 2.6rem 'Segoe UI', Arial, sans-serif; fill: #F8FBFF; }
      .map-outline { fill: rgba(17, 34, 68, 0.55); stroke: url(#mapGlow); stroke-width: 2.5; }
      .land { fill: rgba(62, 220, 255, 0.14); stroke: rgba(143, 212, 255, 0.28); stroke-width: 1.4; }
      .point { fill: #F8FBFF; filter: url(#softGlow); }
      .ring { fill: none; stroke: #67E8F9; stroke-width: 2; opacity: 0; transform-box: fill-box; transform-origin: center; animation: ring 4.4s infinite; }
      .point-group.alt .ring { stroke: #A78BFA; }
      .point-group.fast .ring { animation-delay: 0.8s; }
      .point-group.slow .ring { animation-delay: 1.6s; }
      .label { font: 600 0.86rem 'Segoe UI', Arial, sans-serif; fill: #E8F4FF; }
      .legend { font: 600 0.98rem 'Segoe UI', Arial, sans-serif; fill: #BBD7FF; }
      @keyframes ring {
        0% { opacity: 0; transform: scale(0.75); }
        12% { opacity: 0.95; }
        34% { opacity: 0; transform: scale(2.7); }
        100% { opacity: 0; transform: scale(2.7); }
      }
      @media (prefers-reduced-motion: reduce) {
        .ring { animation: none; opacity: 0.35; }
      }
    </style>
  </defs>

  <rect x="12" y="12" width="1176" height="496" rx="36" fill="url(#bg)"/>
  <circle cx="926" cy="110" r="80" fill="#22D3EE" opacity="0.12"/>
  <circle cx="252" cy="430" r="122" fill="#8B5CF6" opacity="0.10"/>

  <text x="96" y="98" class="small-copy">Global commit trail</text>
  <text x="96" y="150" class="headline">Places I've pushed code</text>

  <g transform="translate(90 172)">
    <rect x="0" y="0" width="1020" height="220" rx="26" class="map-outline"/>

    <!-- North America / Greenland (background context) -->
    <path class="land" d="M84 66C114 44 156 34 196 42C230 48 260 62 274 82C246 86 220 96 202 116C178 140 152 146 124 138C102 132 84 116 76 96C72 86 74 74 84 66Z"/>
    <path class="land" d="M286 36C302 24 322 22 338 30C350 36 356 48 350 60C340 70 320 70 304 62C292 56 286 46 286 36Z"/>

    <!-- Europe / North Africa / West Asia -->
    <path class="land" d="M492 60C526 52 560 52 590 62C616 70 636 86 646 108C654 126 652 146 640 160C628 174 604 184 574 186C548 188 524 182 508 168C494 156 488 140 488 124C488 110 492 98 502 88C510 80 500 70 492 60Z"/>
    <path class="land" d="M548 186C568 182 592 184 610 194C626 202 634 216 632 230C628 246 610 258 588 260C568 262 548 254 538 240C530 228 530 210 538 198C540 192 544 188 548 186Z"/>
    <path class="land" d="M644 118C674 110 706 112 734 124C760 136 778 154 786 174C792 188 788 202 776 212C760 226 734 232 708 228C682 224 662 210 652 194C642 176 640 152 644 118Z"/>

    <!-- Asia / SE Asia -->
    <path class="land" d="M742 94C776 82 818 82 854 96C886 108 908 130 912 154C916 176 902 194 874 206C842 220 802 218 772 206C748 196 732 180 730 160C728 136 730 110 742 94Z"/>
    <path class="land" d="M812 210C826 204 844 204 856 212C868 220 872 234 866 246C858 258 842 262 826 258C812 254 804 242 804 228C804 220 806 214 812 210Z"/>

    <!-- Highlight points -->
    <g class="point-group fast">
      <circle cx="814" cy="232" r="4.6" class="point"/>
      <circle cx="814" cy="232" r="12" class="ring"/>
      <text x="828" y="236" class="label">Singapore</text>
    </g>

    <g class="point-group slow alt">
      <circle cx="794" cy="218" r="4.6" class="point"/>
      <circle cx="794" cy="218" r="12" class="ring"/>
      <text x="808" y="206" class="label">Thailand</text>
    </g>

    <g class="point-group">
      <circle cx="566" cy="206" r="4.6" class="point"/>
      <circle cx="566" cy="206" r="12" class="ring"/>
      <text x="542" y="224" class="label">Egypt</text>
    </g>

    <g class="point-group alt">
      <circle cx="562" cy="116" r="4.6" class="point"/>
      <circle cx="562" cy="116" r="12" class="ring"/>
      <text x="574" y="110" class="label">Poland</text>
    </g>

    <g class="point-group fast">
      <circle cx="538" cy="136" r="4.6" class="point"/>
      <circle cx="538" cy="136" r="12" class="ring"/>
      <text x="504" y="136" class="label">Italy</text>
    </g>

    <g class="point-group slow alt">
      <circle cx="510" cy="122" r="4.6" class="point"/>
      <circle cx="510" cy="122" r="12" class="ring"/>
      <text x="466" y="116" class="label">France</text>
    </g>

    <g class="point-group">
      <circle cx="496" cy="104" r="4.6" class="point"/>
      <circle cx="496" cy="104" r="12" class="ring"/>
      <text x="448" y="96" class="label">England</text>
    </g>

    <g class="point-group alt">
      <circle cx="522" cy="106" r="4.6" class="point"/>
      <circle cx="522" cy="106" r="12" class="ring"/>
      <text x="532" y="92" class="label">Netherlands</text>
    </g>

    <g class="point-group fast">
      <circle cx="552" cy="154" r="4.6" class="point"/>
      <circle cx="552" cy="154" r="12" class="ring"/>
      <text x="564" y="168" class="label">Greece</text>
    </g>

    <g class="point-group slow alt">
      <circle cx="566" cy="146" r="4.6" class="point"/>
      <circle cx="566" cy="146" r="12" class="ring"/>
      <text x="578" y="148" class="label">Bulgaria</text>
    </g>

    <g class="point-group">
      <circle cx="548" cy="144" r="4.6" class="point"/>
      <circle cx="548" cy="144" r="12" class="ring"/>
      <text x="506" y="156" class="label">Montenegro</text>
    </g>

    <g class="point-group alt">
      <circle cx="554" cy="138" r="4.6" class="point"/>
      <circle cx="554" cy="138" r="12" class="ring"/>
      <text x="562" y="132" class="label">Croatia</text>
    </g>
  </g>

  <g opacity="0.88">
    <rect x="94" y="420" width="1012" height="52" rx="18" fill="#07142D" fill-opacity="0.68" stroke="#8CB8FF" stroke-opacity="0.18"/>
    <text x="120" y="452" class="legend">Singapore • Thailand • Egypt • Poland • Italy • France • England • Netherlands • Greece • Bulgaria • Montenegro • Croatia</text>
  </g>
</svg>
